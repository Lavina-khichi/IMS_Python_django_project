{% load static %}
<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logged Out | Insurance Management</title>
    <!-- Bootstrap 5 + Font Awesome 6 + Google Fonts -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #0a2b44 0%, #1a4b6d 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }
        
        /* Animated Background */
        .shape {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.03);
            animation: float 20s infinite;
        }
        
        .shape-1 {
            width: 400px;
            height: 400px;
            top: -200px;
            left: -200px;
            animation-delay: 0s;
        }
        
        .shape-2 {
            width: 500px;
            height: 500px;
            bottom: -250px;
            right: -250px;
            animation-delay: 5s;
        }
        
        .shape-3 {
            width: 300px;
            height: 300px;
            bottom: 100px;
            left: 100px;
            animation-delay: 10s;
        }
        
        @keyframes float {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            33% { transform: translate(50px, -50px) rotate(120deg); }
            66% { transform: translate(-30px, 30px) rotate(240deg); }
        }
        
        .logout-container {
            max-width: 500px;
            width: 100%;
            position: relative;
            z-index: 100;
            animation: fadeInUp 0.8s ease;
        }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .logout-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 3rem;
            padding: 3rem 2.5rem;
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.3);
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.5);
            position: relative;
            overflow: hidden;
        }
        
        .logout-card::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -30%;
            width: 300px;
            height: 300px;
            background: rgba(249, 184, 27, 0.1);
            border-radius: 50%;
            animation: pulse 4s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.2); opacity: 0.8; }
        }
        
        .logout-icon {
            width: 120px;
            height: 120px;
            background: linear-gradient(135deg, #0a3d62, #135b8d);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 30px;
            border: 5px solid #f9b81b;
            position: relative;
            z-index: 10;
        }
        
        .logout-icon i {
            font-size: 4rem;
            color: #f9b81b;
        }
        
        .logout-card h1 {
            color: #0a3d62;
            font-size: 2.8rem;
            font-weight: 800;
            margin-bottom: 15px;
            position: relative;
            z-index: 10;
        }
        
        .logout-card .lead {
            color: #5e7d9c;
            font-size: 1.2rem;
            margin-bottom: 25px;
            position: relative;
            z-index: 10;
        }
        
        .timer-badge {
            background: #f9b81b;
            color: #0a2b44;
            border-radius: 50px;
            padding: 12px 25px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            font-weight: 600;
            margin-bottom: 30px;
            position: relative;
            z-index: 10;
            box-shadow: 0 10px 20px rgba(249, 184, 27, 0.3);
        }
        
        .timer-badge i {
            font-size: 1.2rem;
        }
        
        .timer-number {
            font-size: 1.5rem;
            font-weight: 800;
            margin-left: 5px;
        }
        
        .action-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-bottom: 30px;
            position: relative;
            z-index: 10;
        }
        
        .btn-home {
            background: linear-gradient(135deg, #0a3d62, #135b8d);
            color: white;
            border: none;
            border-radius: 50px;
            padding: 1rem 2.5rem;
            font-weight: 600;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            flex: 1;
            justify-content: center;
        }
        
        .btn-home:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(10, 61, 98, 0.4);
            color: white;
        }
        
        .btn-home i {
            color: #f9b81b;
        }
        
        .btn-login {
            background: transparent;
            color: #0a3d62;
            border: 2px solid #0a3d62;
            border-radius: 50px;
            padding: 1rem 2.5rem;
            font-weight: 600;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            flex: 1;
            justify-content: center;
        }
        
        .btn-login:hover {
            background: #0a3d62;
            color: white;
            transform: translateY(-5px);
            border-color: #0a3d62;
        }
        
        .btn-login:hover i {
            color: #f9b81b;
        }
        
        .btn-login i {
            color: #f9b81b;
            transition: color 0.3s;
        }
        
        .security-note {
            background: rgba(10, 61, 98, 0.05);
            border-radius: 50px;
            padding: 15px 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            color: #0a3d62;
            font-size: 0.95rem;
            position: relative;
            z-index: 10;
            border: 1px solid rgba(249, 184, 27, 0.2);
        }
        
        .security-note i {
            color: #f9b81b;
            font-size: 1.2rem;
        }
        
        .session-details {
            margin-top: 25px;
            padding: 15px;
            background: #f8fcff;
            border-radius: 1rem;
            font-size: 0.9rem;
            color: #5e7d9c;
            position: relative;
            z-index: 10;
        }
        
        .session-details i {
            color: #f9b81b;
            margin-right: 8px;
        }
        
        @media (max-width: 768px) {
            .logout-card {
                padding: 2rem 1.5rem;
            }
            
            .logout-card h1 {
                font-size: 2.2rem;
            }
            
            .action-buttons {
                flex-direction: column;
            }
            
            .timer-badge {
                flex-direction: column;
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <!-- Animated Background Shapes -->
    <div class="shape shape-1"></div>
    <div class="shape shape-2"></div>
    <div class="shape shape-3"></div>
    
    <div class="logout-container">
        <div class="logout-card">
            <!-- Logout Icon -->
            <div class="logout-icon">
                <i class="fas fa-door-open"></i>
            </div>
            
            <h1>You're Logged Out</h1>
            <p class="lead">Thank you for using Insurance Management System</p>
            
            <!-- Auto-redirect Timer -->
            <div class="timer-badge" id="timerDisplay">
                <i class="fas fa-clock"></i>
                <span>Redirecting to home in</span>
                <span class="timer-number" id="timer">5</span>
                <span>seconds</span>
            </div>
            
            <!-- Action Buttons -->
            <div class="action-buttons">
                <a href="/" class="btn-home" id="homeBtn">
                    <i class="fas fa-home"></i>
                    Go to Home
                </a>
                <a href="/customer/customerlogin" class="btn-login">
                    <i class="fas fa-sign-in-alt"></i>
                    Login Again
                </a>
            </div>
            
            <!-- Security Note -->
            <div class="security-note">
                <i class="fas fa-shield-alt"></i>
                <span>Your session has been securely terminated</span>
            </div>
            
            <!-- Session Details -->
            <div class="session-details">
                <p style="margin-bottom: 5px;">
                    <i class="fas fa-check-circle" style="color: #10b981;"></i>
                    All sessions cleared
                </p>
                <p style="margin-bottom: 0;">
                    <i class="fas fa-clock" style="color: #f9b81b;"></i>
                    Logged out at: <span id="logoutTime"></span>
                </p>
            </div>
        </div>
    </div>
    
    <script>
        // Timer countdown
        let secondsLeft = 5;
        const timerElement = document.getElementById('timer');
        const homeBtn = document.getElementById('homeBtn');
        
        const countdown = setInterval(function() {
            secondsLeft--;
            timerElement.textContent = secondsLeft;
            
            if (secondsLeft <= 0) {
                clearInterval(countdown);
                window.location.href = '/';
            }
        }, 1000);
        
        // Clear timer when home button is clicked
        homeBtn.addEventListener('click', function(e) {
            clearInterval(countdown);
        });
        
        // Display current time
        const now = new Date();
        const timeString = now.toLocaleTimeString('en-US', { 
            hour: '2-digit', 
            minute: '2-digit',
            second: '2-digit',
            hour12: true 
        });
        document.getElementById('logoutTime').textContent = timeString;
        
        // Prevent form resubmission on page refresh
        if (window.history.replaceState) {
            window.history.replaceState(null, null, window.location.href);
        }
    </script>
</body>
</html>
