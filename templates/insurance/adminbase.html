<!DOCTYPE html>
{% load static %}
<html lang="en" dir="ltr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel | Insurance Management</title>
    
    <!-- Bootstrap 5 + Font Awesome 6 + Google Fonts -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #f0f7ff;
            overflow-x: hidden;
            padding-top: 70px;
        }
        
        /* ===== HEADER STYLES ===== */
        .admin-header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 70px;
            background: linear-gradient(135deg, #0a2b44, #123b5e);
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.15);
            z-index: 1000;
            display: flex;
            align-items: center;
            padding: 0 30px;
            border-bottom: 3px solid #f9b81b;
        }
        
        .header-left {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        
        .menu-toggle {
            background: transparent;
            border: none;
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
            transition: color 0.3s;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
        }
        
        .menu-toggle:hover {
            background: rgba(255, 255, 255, 0.1);
            color: #f9b81b;
        }
        
        .logo-area {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .logo-icon {
            width: 40px;
            height: 40px;
            background: #f9b81b;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            transform: rotate(45deg);
            transition: transform 0.3s;
        }
        
        .logo-icon i {
            transform: rotate(-45deg);
            color: #0a2b44;
            font-size: 1.3rem;
        }
        
        .logo-text {
            color: white;
            font-weight: 700;
            font-size: 1.4rem;
            letter-spacing: -0.5px;
        }
        
        .logo-text span {
            color: #f9b81b;
        }
        
        .header-right {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 20px;
        }
        
        .notification-badge {
            position: relative;
            color: white;
            font-size: 1.3rem;
            cursor: pointer;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            transition: background 0.3s;
        }
        
        .notification-badge:hover {
            background: rgba(255, 255, 255, 0.1);
        }
        
        .notification-badge .badge {
            position: absolute;
            top: 0;
            right: 0;
            background: #f9b81b;
            color: #0a2b44;
            font-size: 0.7rem;
            padding: 2px 6px;
            border-radius: 10px;
            font-weight: 600;
        }
        
        .admin-profile {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(255, 255, 255, 0.1);
            padding: 5px 15px 5px 5px;
            border-radius: 40px;
            cursor: pointer;
            transition: background 0.3s;
            border: 1px solid rgba(249, 184, 27, 0.3);
        }
        
        .admin-profile:hover {
            background: rgba(255, 255, 255, 0.2);
        }
        
        .profile-img {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #f9b81b;
        }
        
        .profile-info {
            display: none;
        }
        
        @media (min-width: 768px) {
            .profile-info {
                display: block;
            }
            
            .profile-info h6 {
                color: white;
                font-size: 0.9rem;
                font-weight: 600;
                margin: 0;
            }
            
            .profile-info p {
                color: rgba(255, 255, 255, 0.7);
                font-size: 0.75rem;
                margin: 0;
            }
        }
        
        /* Logout form styles */
        .logout-form {
            display: inline;
            margin: 0;
        }
        
        .logout-btn {
            background: rgba(249, 184, 27, 0.15);
            border: 1px solid rgba(249, 184, 27, 0.5);
            border-radius: 40px;
            padding: 8px 20px;
            color: white;
            font-weight: 600;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
            border: none;
            cursor: pointer;
        }
        
        .logout-btn i {
            color: #f9b81b;
        }
        
        .logout-btn:hover {
            background: #f9b81b;
            color: #0a2b44;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(249, 184, 27, 0.3);
        }
        
        .logout-btn:hover i {
            color: #0a2b44;
        }
        
        /* ===== SIDEBAR STYLES ===== */
        .admin-sidebar {
            position: fixed;
            top: 70px;
            left: 0;
            width: 280px;
            height: calc(100vh - 70px);
            background: white;
            box-shadow: 5px 0 20px rgba(0, 0, 0, 0.05);
            z-index: 999;
            transition: all 0.3s ease;
            overflow-y: auto;
            overflow-x: hidden;
        }
        
        .admin-sidebar.collapsed {
            width: 80px;
        }
        
        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid #eef2f6;
            text-align: center;
        }
        
        .admin-avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #f9b81b;
            margin-bottom: 15px;
            transition: all 0.3s;
        }
        
        .collapsed .admin-avatar {
            width: 50px;
            height: 50px;
            border-width: 2px;
        }
        
        .admin-name {
            font-weight: 700;
            color: #0a3d62;
            margin-bottom: 5px;
            font-size: 1.2rem;
        }
        
        .collapsed .admin-name,
        .collapsed .admin-role,
        .collapsed .menu-text {
            display: none;
        }
        
        .admin-role {
            background: #f9b81b;
            color: #0a2b44;
            padding: 5px 15px;
            border-radius: 30px;
            font-size: 0.8rem;
            font-weight: 600;
            display: inline-block;
        }
        
        .sidebar-menu {
            padding: 20px 0;
        }
        
        .menu-item {
            display: flex;
            align-items: center;
            padding: 12px 25px;
            color: #4a6b8a;
            text-decoration: none;
            transition: all 0.3s;
            border-left: 4px solid transparent;
            margin: 5px 0;
            position: relative;
        }
        
        .menu-item i {
            width: 30px;
            font-size: 1.3rem;
            color: #0a3d62;
            transition: all 0.3s;
        }
        
        .menu-item .menu-text {
            font-weight: 500;
            transition: all 0.3s;
        }
        
        .menu-item:hover {
            background: #ecf5fd;
            border-left-color: #f9b81b;
            color: #0a3d62;
        }
        
        .menu-item:hover i {
            color: #f9b81b;
            transform: translateX(5px);
        }
        
        .menu-item.active {
            background: #e0edfb;
            border-left-color: #f9b81b;
            color: #0a3d62;
            font-weight: 600;
        }
        
        .menu-item.active i {
            color: #f9b81b;
        }
        
        .collapsed .menu-item {
            padding: 15px 0;
            justify-content: center;
        }
        
        .collapsed .menu-item i {
            margin: 0;
            width: auto;
            font-size: 1.5rem;
        }
        
        .menu-divider {
            height: 1px;
            background: #eef2f6;
            margin: 15px 0;
        }
        
        /* ===== MAIN CONTENT STYLES ===== */
        .main-content {
            margin-left: 280px;
            margin-top: 70px;
            padding: 30px;
            transition: all 0.3s ease;
            min-height: calc(100vh - 70px);
            background: #f0f7ff;
        }
        
        .main-content.expanded {
            margin-left: 80px;
        }
        
        /* ===== CARD STYLES ===== */
        .card-custom {
            background: white;
            border-radius: 1.8rem;
            box-shadow: 0 10px 30px rgba(0, 30, 50, 0.05);
            border: none;
            overflow: hidden;
            transition: all 0.3s;
        }
        
        .card-custom:hover {
            box-shadow: 0 20px 40px rgba(0, 30, 50, 0.1);
            transform: translateY(-5px);
        }
        
        .card-header-custom {
            background: linear-gradient(135deg, #0a3d62, #135b8d);
            color: white;
            padding: 1.2rem 1.5rem;
            border-bottom: 3px solid #f9b81b;
        }
        
        .card-header-custom h6 {
            margin: 0;
            font-weight: 600;
            font-size: 1.1rem;
        }
        
        .card-header-custom i {
            margin-right: 10px;
            color: #f9b81b;
        }
        
        /* ===== TABLE STYLES ===== */
        .table-responsive {
            border-radius: 1.5rem;
            overflow: hidden;
        }
        
        .table-custom {
            background: white;
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
        }
        
        .table-custom thead {
            background: #0a3d62;
            color: white;
        }
        
        .table-custom th {
            padding: 1rem 1.5rem;
            font-weight: 600;
            font-size: 0.95rem;
            border: none;
        }
        
        .table-custom td {
            padding: 1rem 1.5rem;
            vertical-align: middle;
            border-bottom: 1px solid #eef2f6;
            color: #2c4f6e;
        }
        
        .table-custom tbody tr:hover {
            background: #f8fcff;
        }
        
        /* ===== BUTTON STYLES ===== */
        .btn-approve {
            background: #10b981;
            border: none;
            border-radius: 40px;
            padding: 0.4rem 1.2rem;
            font-weight: 600;
            color: white;
            font-size: 0.85rem;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-block;
        }
        
        .btn-approve:hover {
            background: #059669;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(16, 185, 129, 0.3);
            color: white;
        }
        
        .btn-reject {
            background: #ef4444;
            border: none;
            border-radius: 40px;
            padding: 0.4rem 1.2rem;
            font-weight: 600;
            color: white;
            font-size: 0.85rem;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-block;
        }
        
        .btn-reject:hover {
            background: #dc2626;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(239, 68, 68, 0.3);
            color: white;
        }
        
        .btn-primary-custom {
            background: #0a3d62;
            border: none;
            border-radius: 40px;
            padding: 0.6rem 1.5rem;
            font-weight: 600;
            color: white;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-block;
        }
        
        .btn-primary-custom:hover {
            background: #135b8d;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(10, 61, 98, 0.3);
            color: white;
        }
        
        .btn-danger-custom {
            background: #ef4444;
            border: none;
            border-radius: 40px;
            padding: 0.6rem 1.5rem;
            font-weight: 600;
            color: white;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-block;
        }
        
        .btn-danger-custom:hover {
            background: #dc2626;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(239, 68, 68, 0.3);
            color: white;
        }
        
        .btn-warning-custom {
            background: #f9b81b;
            border: none;
            border-radius: 40px;
            padding: 0.6rem 1.5rem;
            font-weight: 600;
            color: #0a2b44;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-block;
        }
        
        .btn-warning-custom:hover {
            background: #e5a50f;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(249, 184, 27, 0.3);
            color: #0a2b44;
        }
        
        .btn-sm {
            padding: 0.3rem 1rem;
            font-size: 0.85rem;
        }
        
        /* ===== BADGE STYLES ===== */
        .badge-status {
            padding: 0.4rem 1rem;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.85rem;
        }
        
        .badge-approved {
            background: #d1fae5;
            color: #065f46;
        }
        
        .badge-pending {
            background: #fff3cd;
            color: #856404;
        }
        
        .badge-disapproved {
            background: #fee2e2;
            color: #991b1b;
        }
        
        /* ===== FORM STYLES ===== */
        .form-container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 2rem;
            padding: 2.5rem;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.05);
        }
        
        .form-group-custom {
            margin-bottom: 1.5rem;
        }
        
        .form-group-custom label {
            font-weight: 600;
            color: #0a3d62;
            margin-bottom: 0.5rem;
            display: block;
        }
        
        .form-group-custom label i {
            color: #f9b81b;
            margin-right: 8px;
        }
        
        .form-control-custom {
            width: 100%;
            padding: 0.8rem 1.2rem;
            border: 2px solid #e1ecf5;
            border-radius: 1.2rem;
            font-size: 1rem;
            transition: all 0.3s;
        }
        
        .form-control-custom:focus {
            border-color: #f9b81b;
            box-shadow: 0 0 0 4px rgba(249, 184, 27, 0.15);
            outline: none;
        }
        
        /* ===== ANIMATIONS ===== */
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }
        
        .animate-slide {
            animation: slideIn 0.5s ease forwards;
        }
        
        /* ===== RESPONSIVE ===== */
        @media (max-width: 768px) {
            .admin-sidebar {
                left: -280px;
            }
            
            .admin-sidebar.show {
                left: 0;
            }
            
            .main-content {
                margin-left: 0 !important;
                padding: 20px;
            }
            
            .header-right {
                gap: 10px;
            }
            
            .logout-btn span {
                display: none;
            }
            
            .logout-btn i {
                margin: 0;
            }
            
            .logo-text {
                font-size: 1rem;
            }
        }
        
        /* ===== SCROLLBAR STYLES ===== */
        ::-webkit-scrollbar {
            width: 8px;
        }
        
        ::-webkit-scrollbar-track {
            background: #f1f1f1;
        }
        
        ::-webkit-scrollbar-thumb {
            background: #0a3d62;
            border-radius: 10px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: #135b8d;
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="admin-header">
        <div class="header-left">
            <button class="menu-toggle" id="sidebarToggle">
                <i class="fas fa-bars"></i>
            </button>
            <div class="logo-area">
                <div class="logo-icon">
                    <i class="fas fa-shield-alt"></i>
                </div>
                <div class="logo-text">
                    Insurance<span>Manager</span>
                </div>
            </div>
        </div>
        
        <div class="header-right">
            <div class="notification-badge">
                <i class="fas fa-bell"></i>
                <span class="badge">3</span>
            </div>
            
            <div class="admin-profile" onclick="toggleProfileMenu()">
                <img src="{% static 'image/admin.png' %}" alt="Admin" class="profile-img">
                <div class="profile-info">
                    <h6>Administrator</h6>
                    <p>Super Admin</p>
                </div>
            </div>
            
            <!-- Logout form with POST method (FIXED) -->
            <form method="post" action="/logout" class="logout-form">
                {% csrf_token %}
                <button type="submit" class="logout-btn">
                    <i class="fas fa-sign-out-alt"></i> <span>Logout</span>
                </button>
            </form>
        </div>
    </header>
    
    <!-- Sidebar -->
    <aside class="admin-sidebar" id="sidebar">
        <div class="sidebar-header">
            <img src="{% static 'image/admin.png' %}" alt="Admin" class="admin-avatar">
            <h5 class="admin-name">Administrator</h5>
            <span class="admin-role"><i class="fas fa-crown"></i> Super Admin</span>
        </div>
        
        <div class="sidebar-menu">
            <a href="/admin-dashboard" class="menu-item {% if request.path == '/admin-dashboard' %}active{% endif %}">
                <i class="fas fa-tachometer-alt"></i>
                <span class="menu-text">Dashboard</span>
            </a>
            
            <a href="/admin-view-customer" class="menu-item {% if request.path == '/admin-view-customer' %}active{% endif %}">
                <i class="fas fa-users"></i>
                <span class="menu-text">Customers</span>
            </a>
            
            <div class="menu-divider"></div>
            
            <a href="/admin-category" class="menu-item {% if request.path == '/admin-category' %}active{% endif %}">
                <i class="fas fa-list-alt"></i>
                <span class="menu-text">Categories</span>
            </a>
            
            <a href="/admin-policy" class="menu-item {% if request.path == '/admin-policy' %}active{% endif %}">
                <i class="fab fa-product-hunt"></i>
                <span class="menu-text">Policies</span>
            </a>
            
            <div class="menu-divider"></div>
            
            <a href="/admin-question" class="menu-item {% if request.path == '/admin-question' %}active{% endif %}">
                <i class="fas fa-question-circle"></i>
                <span class="menu-text">Questions</span>
            </a>
            
            <div class="menu-divider"></div>
            
            <a href="/admin-view-policy-holder" class="menu-item">
                <i class="fas fa-user-tie"></i>
                <span class="menu-text">Policy Holders</span>
            </a>
        </div>
    </aside>
    
    <!-- Main Content -->
    <main class="main-content" id="mainContent">
        {% block content %}
        {% endblock %}
    </main>
    
    <!-- JavaScript -->
    <script>
        // Sidebar Toggle
        const sidebarToggle = document.getElementById('sidebarToggle');
        const sidebar = document.getElementById('sidebar');
        const mainContent = document.getElementById('mainContent');
        
        sidebarToggle.addEventListener('click', function() {
            if (window.innerWidth <= 768) {
                sidebar.classList.toggle('show');
            } else {
                sidebar.classList.toggle('collapsed');
                mainContent.classList.toggle('expanded');
            }
        });
        
        // Profile Menu (for mobile)
        function toggleProfileMenu() {
            // Implement profile dropdown if needed
        }
        
        // Close sidebar when clicking outside on mobile
        document.addEventListener('click', function(event) {
            if (window.innerWidth <= 768) {
                if (!sidebar.contains(event.target) && !sidebarToggle.contains(event.target)) {
                    sidebar.classList.remove('show');
                }
            }
        });
        
        // Active menu highlighting
        const currentPath = window.location.pathname;
        document.querySelectorAll('.menu-item').forEach(item => {
            if (item.getAttribute('href') === currentPath) {
                item.classList.add('active');
            }
        });
        
        // Smooth scroll for anchor links
        document.querySelectorAll('a[href^="#"]').forEach(anchor => {
            anchor.addEventListener('click', function (e) {
                e.preventDefault();
                document.querySelector(this.getAttribute('href')).scrollIntoView({
                    behavior: 'smooth'
                });
            });
        });
        
        // Add animation to cards
        document.querySelectorAll('.card-custom').forEach((card, index) => {
            card.style.animationDelay = `${index * 0.1}s`;
            card.classList.add('animate-slide');
        });
    </script>
    
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
